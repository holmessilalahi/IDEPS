<!DOCTYPE html>
<html>

<head>

<title>Earthquake Prediction System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* ===============================
GLOBAL STYLE
=============================== */

body{
background:#f4f6f9;
font-family:"Segoe UI", Roboto, Helvetica, Arial, sans-serif;
color:#2c3e50;
}

.container{
max-width:1200px;
margin-bottom:40px;
}

/* ===============================
TITLE
=============================== */

h2{
font-weight:700;
color:#0b2e59;
margin-bottom:25px;
margin-top:10px;
}

/* ===============================
CARD STYLE
=============================== */

.card{
border:none;
border-radius:12px;
background:white;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:all .2s ease;
}

.card:hover{
box-shadow:0 10px 28px rgba(0,0,0,0.12);
}

.card h5{
font-weight:600;
color:#0b2e59;
margin-bottom:15px;
}

/* ===============================
INPUT
=============================== */

label{
font-weight:600;
font-size:14px;
color:#34495e;
margin-top:5px;
}

.form-control{
border-radius:8px;
border:1px solid #d6dbe3;
padding:10px;
}

.form-control:focus{
border-color:#1f4e79;
box-shadow:0 0 0 0.1rem rgba(31,78,121,0.15);
}

/* ===============================
BUTTON
=============================== */

.btn-primary{
background:#0b2e59;
border:none;
border-radius:8px;
padding:10px;
font-weight:600;
transition:all .2s;
}

.btn-primary:hover{
background:#174a8b;
transform:translateY(-1px);
box-shadow:0 6px 14px rgba(0,0,0,0.2);
}

/* ===============================
MAP
=============================== */

#map{
height:450px;
width:100%;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

/* ===============================
RESULT PANEL
=============================== */

#mag, #depth{
font-size:20px;
color:#0b2e59;
}

/* ===============================
PLOTS
=============================== */

#mag_plot, #depth_plot{
border-radius:10px;
background:#ffffff;
padding:10px;
border:1px solid #e1e5ec;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* ===============================
TEXT STYLE
=============================== */

p{
color:#6c757d;
font-size:14px;
}

/* ===============================
RESPONSIVE
=============================== */

@media (max-width:768px){

#map{
height:350px;
}

h2{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="d-flex align-items-center justify-content-between mt-3">

    <div>
        <h2 class="mb-0">Indonesian Earthquake Prediction System (IDEPS)</h2>
        <p class="mb-0">by Holmes Heriyanto Silalahi</p>
    </div>

    <!-- <img src="/static/logo.png" alt="IDEPS Logo" style="height:60px;"> -->

</div>

<!-- MAP FULL WIDTH -->
<div class="row">
<div class="col-12">
<div id="map"></div>
</div>
</div>

<!-- INPUT + RESULT -->
<div class="row mt-3">

<div class="col-md-6">

<div class="card p-3">

<h5>Input Location</h5>

<label>Latitude</label>
<input type="text" id="latitude" class="form-control">

<label class="mt-2">Longitude</label>
<input type="text" id="longitude" class="form-control">

<button class="btn btn-primary mt-3" onclick="predict()">Predict</button>

<p class="mt-3">Or click on the maps</p>

</div>

</div>

<div class="col-md-6">

<div class="card p-3">

<h5>Prediction Result</h5>

Magnitude: <b id="mag"></b><br>
Depth (km): <b id="depth"></b>

</div>

</div>

</div>

<!-- GRAPHS -->
<div class="row mt-3">

<div class="col-md-6">

<div class="card p-3">

<h5>Magnitude Probability</h5>

<img id="mag_plot" width="100%">

</div>

</div>

<div class="col-md-6">

<div class="card p-3">

<h5>Depth Probability</h5>

<img id="depth_plot" width="100%">

</div>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ======================
// MAP
// ======================

var map = L.map('map').setView([-2.5,118],5);

// Tile OpenStreetMap
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

// Batasi area Indonesia
var bounds = [
[-11,94],
[6,141]
];

map.setMaxBounds(bounds);

var marker;

map.on('click', function(e){

var lat = e.latlng.lat;
var lon = e.latlng.lng;

document.getElementById("latitude").value = lat.toFixed(5);
document.getElementById("longitude").value = lon.toFixed(5);

if(marker){
map.removeLayer(marker);
}

marker = L.marker([lat,lon]).addTo(map);

});

// ======================
// PREDICT
// ======================

function predict(){

var lat = document.getElementById("latitude").value
var lon = document.getElementById("longitude").value

document.getElementById("mag").innerHTML = "Loading..."
document.getElementById("depth").innerHTML = "Loading..."

var formData = new FormData()

formData.append("latitude", lat)
formData.append("longitude", lon)

fetch("/predict",{
method:"POST",
body:formData
})
.then(res => res.json())
.then(data => {

document.getElementById("mag").innerHTML = data.magnitude
document.getElementById("depth").innerHTML = data.depth

document.getElementById("mag_plot").src =
"data:image/png;base64," + data.mag_plot

document.getElementById("depth_plot").src =
"data:image/png;base64," + data.depth_plot

})

}

</script>

</body>
</html>
